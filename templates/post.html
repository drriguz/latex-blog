{% extends "base.html" %}

{% block title %}{{ title }} - LaTeX Blog{% endblock %}

{% block content %}
<article class="post">
    <header class="post-header">
        <h1 class="post-title">{{ title }}</h1>
        <div class="post-meta">
            <time datetime="{{ date }}">{{ date }}</time>
            {% if tags %}
            <span class="post-tags">
                {% for tag in tags %}
                <span class="tag">{{ tag }}</span>
                {% endfor %}
            </span>
            {% endif %}
            <a href="post.pdf" class="pdf-download" title="Download PDF">PDF ↓</a>
        </div>
    </header>
    <div class="post-content">
        {{ content | safe }}
    </div>
</article>
{% endblock %}
